run:
  seed: 0
  out_root: outputs
  name: cifar10-base

data:
  source: tf_keras
  dataset_name: cifar10
  batch_size: 128
  augment: true
  val_split: 0.1

model:
  name: cnn_resnet
  variant: large
  num_classes: 10
  # Optional: override filters, kernel sizes, and strides for fine-grained control
  # num_filters: [16, 16, 32, 32, 64, 64]  # block 1, 2, 3
  # kernel_sizes: [3, 3, 3, 3, 3, 3]       # per-layer kernel size
  # strides: "111212212"                   # per-layer strides as string (3 per block)

quant:
  activation_total_bits: 4
  activation_int_bits: 1
  weight_total_bits: 4
  weight_int_bits: 1
  scheme: symmetric

train:
  epochs: 100
  optimizer: adam
  lr: 0.001
  weight_decay: 0.0
  loss: sparse_ce
  metrics: [sparse_acc]

callbacks:
  early_stopping:
    enabled: true
    patience: 10
  checkpoint:
    enabled: true
    monitor: val/sparse_acc
  wandb:
    enabled: true
    log_freq: epoch

ensemble:
  size: 4

wandb:
  enabled: true
  project: qensemble
  entity: your_entity
  group: cifar10
  tags: ["cifar10", "qkeras"]

program: -m qensemble.main
name: cifar10_phase2_dependent
method: grid
metric:
  name: test/sparse_acc
  goal: maximize
parameters:
  run.mode:
    value: train_dependent
  model.variant:
    values: [medium, large]
  quant.activation_total_bits:
    values: [4, 6, 8]
  quant.logits_total_bits:
    values: [4, 6, 8]
  ensemble.size:
    values: [2, 3, 4, 5]
  run.seed:
    values: [0, 1]
command:
  - ${env}
  - python
  - ${program}
  - --config
  - configs/cifar10/base.yaml

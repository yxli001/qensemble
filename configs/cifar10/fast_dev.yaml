run:
  mode: train_single
  seed: 0
  out_root: outputs
  name: fast-dev

data:
  source: tf_keras
  dataset_name: cifar10
  batch_size: 64
  augment: false
  val_split: 0.1

model:
  name: cnn_resnet
  variant: small
  num_classes: 10

quant:
  enabled: false
  activation_total_bits: 4
  logits_total_bits: 4
  scheme: symmetric

train:
  epochs: 2
  optimizer: adam
  lr: 0.001
  weight_decay: 0.0
  loss: sparse_ce
  metrics: [sparse_acc]

callbacks:
  early_stopping:
    enabled: false
    patience: 2
  checkpoint:
    enabled: false
    monitor: val/sparse_acc
  wandb:
    enabled: false
    log_freq: epoch

ensemble:
  size: 2

wandb:
  enabled: false
  project: qensemble
  group: fast-dev
  tags: ["cifar10", "fast-dev"]

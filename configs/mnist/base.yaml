run:
  mode: train_single
  seed: 0
  out_root: outputs
  name: auto

data:
  source: tf_keras
  dataset_name: mnist
  batch_size: 128
  val_split: 0.1

model:
  name: mlp
  width: [64, 64]
  num_classes: 10

quant:
  enabled: false

train:
  epochs: 20
  optimizer: adam
  lr: 0.001
  loss: sparse_ce
  metrics: [sparse_acc]

callbacks:
  early_stopping:
    enabled: true
    patience: 5
  checkpoint:
    enabled: true
    monitor: val/sparse_acc
  wandb:
    enabled: true 
    log_freq: epoch

ensemble:
  size: 3

wandb:
  enabled: true 
  project: qensemble
  name: mnist-base
  group: mnist
  tags: ["mnist"]
